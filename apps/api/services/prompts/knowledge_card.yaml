# 知识点归纳思维链 v1.0 —— 结构化知识卡片生成器
# 用途：从AI散乱回答中提取知识点、资源、对比表、知识扩展
# 输出格式：JSON，可被知识卡片网页直接渲染

metadata:
  name: "知识点归纳链 v1.0"
  output_format: "JSON"
  style_constraint: "全篇禁止使用破折号（——）。逻辑转折用句号、分号或自然衔接词替代。"

output_schema:
  domain: "领域分类 (AI与技术/认知与行为/产品与商业/编程与工具/通用)"
  terms:
    - term: "术语名称"
      definition: "20字内定义"
  knowledge_points:
    - title: "知识点标题"
      type: "核心概念/方法/原则/事实"
      content: "知识点解析（3-5句）"
      related_pre: "前置知识（没有则填无）"
      related_extend: "延伸阅读方向（没有则填无）"
  tables:
    - table_title: "表格标题"
      table_type: "对比表/汇总表/清单表"
      headers: ["列1", "列2", "列3"]
      rows:
        - ["值1", "值2", "值3"]
  resources:
    - name: "资源名称"
      type: "链接/工具/论文/视频/博客/书籍"
      url: "链接地址"
      description: "一句话说明价值"
  knowledge_extend:
    - concept: "关联概念名"
      relationship: "前置/延伸/相似/对比"
      detail: "关系说明（1-2句）"

stages:
  # ========== 阶段1: 知识点提取 ==========
  - stage: 1_知识点提取
    description: "从原文中提取知识点、术语、表格数据、资源、扩展关联"
    actions:
      - extract_domain: "判断所属领域分类"
      - extract_terms: "抽取所有需要解释的关键术语，每个配一行20字内定义"
      - extract_knowledge_points: "识别所有独立知识点，每个标注类型（核心概念/方法/原则/事实），写3-5句解析，标注前置知识和延伸阅读"
      - extract_tables: "识别原文中可表格化的信息，生成对比表、汇总表或清单表"
      - extract_resources: "抽取所有链接、工具、论文、视频等资源，标注类型和一句话价值说明"
      - extract_knowledge_extend: "识别关联概念，标注关系（前置/延伸/相似/对比）并说明关联原因"

  # ========== 阶段2: 结构化组织 ==========
  - stage: 2_结构化组织
    description: "将提取的信息按输出模板组织，表格优先合并同类信息"
    rules:
      - "知识点按'核心概念 -> 方法 -> 原则 -> 事实'顺序排列"
      - "资源按'链接 -> 论文 -> 工具 -> 视频 -> 博客 -> 书籍'顺序排列"
      - "表格中同类信息合并，避免重复列表"
      - "全文禁止使用破折号"
      - "资源项必须包含url字段，若原文未提供则标注来源缺失"

  # ========== 阶段3: 表格生成规范 ==========
  - stage: 3_表格生成规范
    description: "为对比类、汇总类信息生成结构化表格"
    rules:
      - "表格类型标注为对比表、汇总表或清单表"
      - "对比表不超过5列，行数不限"
      - "汇总表不超过3列，每列有明确语义"
      - "表格标题明确说明表格内容"

  # ========== 阶段4: 质量校验 ==========
  - stage: 4_质量校验
    checks:
      - "术语表不超过10行"
      - "全篇是否未出现任何破折号"
      - "每个知识点是否标注了类型"
      - "每个知识点是否填写了前置知识和延伸阅读"
      - "资源列表是否每项含url"
      - "表格是否有明确标题和类型标注"
      - "knowledge_extend.relationship 只能从（前置/延伸/相似/对比）中选择"
